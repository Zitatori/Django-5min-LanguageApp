{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="card" style="max-width: 480px; margin: 40px auto;">
  <h2>{% trans "Create an account" %}</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <hr>

    <label>
      <input type="checkbox" name="wants_to_teach">
      {% trans "I also want to teach" %}
    </label>

    <button type="submit" class="btn">
      {% trans "Sign up" %}
    </button>
  </form>
  <p style="margin-top:16px; text-align:center; font-size:14px; color:#6b7280;">
    {% trans "Already have an account?" %}
    <a href="{% url 'login' %}" style="color:#6366f1; font-weight:600;">{% trans "Log in here" %}</a>
  </p>
</div>
{% endblock %}
