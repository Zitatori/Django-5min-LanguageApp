{% extends "base.html" %}
{% load i18n %}

{% block content %}
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">{% trans "Talk for 5 Minutes Now" %}</h2>
      <span class="badge badge-yellow">{% trans "Step 1" %}</span>
    </div>

    <p class="card-subtitle">
      {% trans "Select the language you want to practice. If any tutors are online, you will be randomly matched." %}
    </p>

    <form method="post" class="mt-16">
      {% csrf_token %}
      <label>
        {% trans "Select a language" %}
        <select name="language_id">
          {% for lang in languages %}
        <option value="{{ lang.id }}">{% trans lang.name %}</option>          {% endfor %}
        </select>
      </label>

      <div class="mt-16">
        <button type="submit" class="btn">{% trans "Start a 5-Minute Lesson" %}</button>
        <button type="button" class="btn btn-outline"
                onclick="window.location.href='{% url 'home' %}'">
          {% trans "Cancel" %}
        </button>
      </div>
    </form>
  </div>
{% endblock %}
